[gcode_macro PRINT_START]
gcode:
    {% set BED_TEMP = params.BED|default(55)|float %}                 ; Set variables
    {% set EXTRUDER_TEMP = params.EXTRUDER|default(210)|float %}      ; Set variables
	{% set CHAMBER_TEMP = params.CHAMBER|default(50)|float %}         ; Set variables	 
    _status_heating               ; LED status update
    M107                          ; Print fan off 
    M140 S{BED_TEMP}              ; Set bed temperature 
    M104 S{EXTRUDER_TEMP }        ; Set extruder temperature  
    _status_homing                ; LED status update
    G28                           ; Home  All
    G1 X0 Y0 F3600 
    _status_heating               ; LED status update
    M190 S{BED_TEMP}              ; Set and wait for bed temperature 
    M109 S{EXTRUDER_TEMP}         ; Set and wait for extruder temperature
    Clean_Nozzle                  ; Clean nozzle macro
    _status_printing              ; LED status update
    Line_Purge  
    G90                           ; Absolute coordinates
    M83                           ; Relative extruder mode
    G92 E0                        ; Reset extruder

[gcode_macro END_PRINT]
gcode:
     G92 E0                                                   ; reset the extruder
     G1 E-2 F3600                                             ; retract filament
     G91                                                      ; relative positioning   
     {% set max_x = printer.configfile.config["stepper_x"]["position_max"]|float %}
     {% set max_y = printer.configfile.config["stepper_y"]["position_max"]|float %}
     {% set max_z = printer.configfile.config["stepper_z"]["position_max"]|float %}    
     {% if printer.toolhead.position.x < (max_x - 20) %}
        {% set x_safe = 20.0 %}
     {% else %}
        {% set x_safe = -20.0 %}
     {% endif %}
     {% if printer.toolhead.position.y < (max_y - 20) %}
        {% set y_safe = 20.0 %}
     {% else %}
        {% set y_safe = -20.0 %}
     {% endif %}
     {% if printer.toolhead.position.z < (max_z - 2) %}
        {% set z_safe = 2.0 %}
     {% else %}
        {% set z_safe = max_z - printer.toolhead.position.z %}
     {% endif %}
     G0 Z{z_safe} F3600                                       ; move z axis down
     G0 X{x_safe} Y{y_safe} F20000                            ; move nozzle to remove stringing
     TURN_OFF_HEATERS
     M107                                                     ; turn off fan
     G90                                                      ; absolute positioning
     G0 X{max_x} Y{max_y} F3600                               ; park nozzle
     _status_part_ready

[gcode_macro CANCEL_PRINT]
description: Cancel the actual running print
rename_existing: CANCEL_PRINT_BASE
gcode:
     {% set max_x = printer.configfile.config["stepper_x"]["position_max"]|float %}
     {% set max_y = printer.configfile.config["stepper_y"]["position_max"]|float %}
     TURN_OFF_HEATERS
     CANCEL_PRINT_BASE
     G91                                                      ; set to Relative position
     G1 E-1 F300                                              ; retract filament
     G0 Z10                                                   ; move z axis down
     G90                                                      ; set to Absolute position    
     M106 S0                                                  ; disable fan
     G0 X{max_x} Y{max_y} F3600                               ; park nozzle
     _STATUS_READY

[gcode_macro M600]
gcode:    
     PAUSE
     G91 #relative mode
     G1 E-1 F1500
     G1 Z10
     G90 #Absolute positioning    
     SET_IDLE_TIMEOUT TIMEOUT=7200 

[gcode_macro _Purge_Line]
gcode:   
     M83                                                      ; extruder to relative mode
     G92 E0                                                   ; reset extruder
     G1 X{2} Y{1} Z0.4 F5000                                  ; move to start position     
     G1 X{115} E20 F1000                                      ; draw first line     
     G1 X{2} Y{1.4}  E20 F1000                                ; draw second line
     G1 E-0.5 F3000                                           ; retract to avoid stringing    
     G1 X10.5 E0 F1000                                        ; wipe back to break string
     G1 X10 E0 F1000                                          ; wipe forward to break string
     G0 Z2                                                    ; move z axis down
     G92 E0                                                   ; reset extruder