[fan]
#[fan_generic fan0]
#Fan0
pin: EBB36: PA1
max_power: 1.0
kick_start_time: 0.5                   
off_below: 0.13
cycle_time: 0.01
hardware_pwm: false

[heater_fan hotend_fan]
#Fan1
pin: EBB36:PA0
max_power: 1.0
kick_start_time: 0.5
heater: extruder
heater_temp: 50.0

[output_pin nevermore]
pin: gpio17
value: 0
shutdown_value: 0

[temperature_fan electronic_fans]
#Fan2
sensor_type: temperature_host
pin: gpio18
max_temp: 75.0       
target_temp: 55.0
min_temp: 0
shutdown_speed: 0.0
kick_start_time: 0.5
off_below: 0.19
max_speed: 1.0
min_speed: 0.0
control: pid
pid_Kp: 2.0
pid_Ki: 5.0
pid_Kd: 0.5
pid_deriv_time: 2.0