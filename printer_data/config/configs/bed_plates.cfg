[gcode_macro _set_bed_plate]
gcode:
    {% if curr_bed_type=="Textured PEI Plate" %}SET_GCODE_OFFSET Z=0.00
    {% elif curr_bed_type=="Engineering Plate" %}SET_GCODE_OFFSET Z=+0.25
    {% elif curr_bed_type=="High Temp Plate" %}SET_GCODE_OFFSET Z=+0.5
    {% elif curr_bed_type=="Cool Plate" %}SET_GCODE_OFFSET Z=+0.5
    {% endif %}