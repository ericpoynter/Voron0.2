[stepper_x]
step_pin: gpio11
dir_pin: gpio10
enable_pin: !gpio12
microsteps: 32
full_steps_per_rotation: 200 
rotation_distance: 40
endstop_pin: tmc2209_stepper_x:virtual_endstop
position_endstop: 120
position_max: 120
position_min: 0
homing_speed: 30
homing_retract_dist: 0
homing_positive_dir: true

[stepper_y]
step_pin: gpio6
dir_pin: gpio5
enable_pin: !gpio7
microsteps: 32
full_steps_per_rotation: 200 
rotation_distance: 40
endstop_pin: tmc2209_stepper_y:virtual_endstop
position_endstop: 120
position_max: 120
position_min: 0
homing_speed: 30
homing_retract_dist: 0
homing_positive_dir: true

[stepper_z]
step_pin: gpio19
dir_pin: gpio28
enable_pin: !gpio2
microsteps: 32
rotation_distance: 8
endstop_pin: ^gpio25
position_max: 125
position_min: -1.5
homing_speed: 40
second_homing_speed: 5
homing_retract_dist: 5

[extruder]
step_pin: EBBCan:PD0
dir_pin: EBBCan:PD1
enable_pin: !EBBCan:PD2
full_steps_per_rotation: 200
microsteps: 16
nozzle_diameter: 0.400
filament_diameter: 1.750
rotation_distance: 4.71622    #New RD = Old RD *(120-x)/100  #####  G1 E100 F100   ####
heater_pin: EBBCan: PB13
sensor_pin: EBBCan: PA3
sensor_type: ATC Semitec 104NT-4-R025H42G
#########   PID_CALIBRATE HEATER=extruder TARGET=245  PCF 25%    ###########
# Dragon: EPCOS 100K B57560G104F
# DragonFLY: EPCOS 100K B57560G104F  
# Phaetus Rapido: ATC Semitec 104NT-4-R025H42G
# Voron Revo: ATC Semitec 104GT-2
smooth_time: 2.0
min_temp: 0
max_temp: 270
max_power: 1.0
min_extrude_temp: 170
max_extrude_only_distance: 150
max_extrude_only_velocity: 120
max_extrude_cross_section: 5
pressure_advance: 0.04                                          
pressure_advance_smooth_time: 0.04

[verify_heater extruder]
max_error: 240
check_gain_time: 240
hysteresis: 5
heating_gain: 1